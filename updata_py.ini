version=0.4.7-26.5.16
announcement=1.优化 当两个版本的缓存文件夹同时存在时不再默认识别到国际服，而是根据游戏版本来识别\n2.优化 验证NMM服务器更新逻辑，适配当前游戏环境\n3.优化 编辑栏中的"打开文件夹"逻辑，现在会额外选中该文件\n4.优化 应用Mod时的逻辑，避免发生错误应用的情况\n5.移除 "协同作战模式"功能，因为目前游戏环境不需要该功能了\n6.新增 “其他”标签页，现在其他类型的Mod将都放到other文件夹中\n7.新增 Mod图表操作界面，新界面UI\n8.新增 Mod预设功能，现在可通过预设快速应用多套Mod了\n9.新增 在Mod列表界面中将鼠标放到角色、编号那一栏会显示该角色的头像\n10.新增 自动检测Hosts更新并写入到电脑功能（需在设置中手动打开并以管理员启动管理器）\n11.新增 重新打包功能，现在可以在NMM中直接重新封包已过期的Mod了\n12.新增 为NMM添加立绘、战斗、掩体、图标、大厅、爆裂，六种类型的皮肤切换的Mod功能\n13.新增 在应用重复Mod弹出弹窗时，可在弹窗内快速预览并取消某个重复的Mod
announcement_tw=1.優化 當兩個版本的緩存文件夾同時存在時不再默認識別到國際服，而是根據遊戲版本來識別\n2.優化 驗證NMM服務器更新邏輯，適配當前遊戲環境\n3.優化 編輯欄中的"打開文件夾"邏輯，現在會額外選中該文件\n4.優化 應用Mod時的邏輯，避免發生錯誤應用的情況\n5.移除 "協同作戰模式"功能，因爲目前遊戲環境不需要該功能了\n6.新增 “其他”標籤頁，現在其他類型的Mod將都放到other文件夾中\n7.新增 Mod圖表操作界面，新界面UI\n8.新增 Mod預設功能，現在可通過預設快速應用多套Mod了\n9.新增 在Mod列表界面中將鼠標放到角色、編號那一欄會顯示該角色的頭像\n10.新增 自動檢測Hosts更新並寫入到電腦功能（需在設置中手動打開並以管理員啓動管理器）\n11.新增 重新打包功能，現在可以在NMM中直接重新封包已過期的Mod了\n12.新增 爲NMM添加立繪、戰鬥、掩體、圖標、大廳、爆裂，六種類型的皮膚切換的Mod功能\n13.新增 在應用重複Mod彈出彈窗時，可在彈窗內快速預覽並取消某個重複的Mod
announcement_en=1.Optimized: when cache folders for both versions exist simultaneously, it no longer defaults to identifying as the global server, but identifies based on the game version \n2. Optimized: verification of NMM server update logic to adapt to the current game environment \n3. Optimized: "Open Folder" logic in the edit bar, now also selects the file \n4. Optimized: the logic when applying Mods to avoid incorrect application \n5. Removed: "Co-op Mode" feature as it is no longer needed in the current game environment \n6. Added: "Other" tab, other types of Mods will now be placed into the other folder \n7. Added: Mod chart operation interface with new UI \n8. Added: Mod preset feature, now multiple sets of Mods can be quickly applied via presets \n9. Added: in the Mod list interface, hovering over the character/number column will display that character's avatar \n10. Added: auto-detect Hosts updates and write to computer feature (needs to be manually enabled in Settings and the manager started as Administrator) \n11. Added: repackaging feature, expired Mods can now be directly repacked in NMM \n12. Added: skin switching Mod feature for six types in NMM: splash art, battle, cover, icon, lobby, and burst \n13. Added: when a duplicate Mod pop-up appears, you can quickly preview and cancel a duplicate Mod within the popup
