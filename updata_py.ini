version=0.4.7-26.6.18
announcement=修复 重新打包界面中“从Mod列表中选择”的列表不刷新的问题\n优化 全面翻新预览Mod界面及其逻辑\n优化 全面翻新Mod列表、Mod图表界面，使其更美观\n优化 应用Mod时检测NMM服务器更新的逻辑（针对单机版本）\n优化 应用Mod时对服务器返回的部分错误信息进行识别并告知\n新增 Mod列表中新增"特效"类型的识别和应用Mod逻辑\n新增 Hosts管理中新增“根据本机网络环境获取最佳hosts”功能\n新增 添加Mod功能，可添加单个文件或文件夹，智能识别Mod文件并复制到mods文件夹中\n新增 导入旧版本Mod数据的功能，可选择旧版本NMM文件夹并完成数据继承到新版本中\n新增 “编辑骨骼”功能，现在可以编辑预览模型中的任意骨骼并导出为新Mod文件\nTips：部分按钮被移动到鼠标右键Mod列表中的弹窗内，请注意查看
announcement_tw=修復 重新打包界面中“從Mod列表中選擇”的列表不刷新的問題\n優化 全面翻新預覽Mod界面及其邏輯\n優化 全面翻新Mod列表、Mod圖表界面，使其更美觀\n優化 應用Mod時檢測NMM服務器更新的邏輯（針對單機版本）\n優化 應用Mod時對服務器返回的部分錯誤信息進行識別並告知\n新增 Mod列表中新增"特效"類型的識別和應用Mod邏輯\n新增 添加Mod功能，可添加單個文件或文件夾，智能識別Mod文件並複製到mods文件夾中\n新增 導入舊版本Mod數據的功能，可選擇舊版本NMM文件夾並完成數據繼承到新版本中\n新增 “編輯骨骼”功能，現在可以編輯預覽模型中的任意骨骼並導出爲新Mod文件\nTips：部分按鈕被移動到鼠標右鍵Mod列表中的彈窗內，請注意查看
announcement_en=Fix: Fixed the issue where the list in "Select from Mod List" in the repack interface was not refreshing.\nImproved: Completely overhauled the Preview Mod interface and its logic.\nImproved: Completely overhauled the Mod List and Mod Graph interfaces for better aesthetics.\nImproved: Optimized the logic for detecting NMM server updates when applying mods (for standalone version).\nImproved: Added recognition and notification for certain error messages returned by the server when applying mods.\nNew: Added recognition and application logic for "Effect" type mods in the Mod List.\nNew: Added an Add Mod feature that allows adding a single file or folder, intelligently identifies mod files, and copies them to the mods folder.\nNew: Added the ability to import mod data from an older version. You can select an old NMM folder and inherit its data into the new version.\nNew: Added "Edit Skeleton" feature. You can now edit any bone in the preview model and export it as a new mod file.\nTip: Some buttons have been moved to the right-click context menu in the Mod List. Please check there.
